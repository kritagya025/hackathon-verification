<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>TERMINAL | Registry Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@300;500;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --cyan: #00f2ff;
            --pink: #ff0055;
            --bg: #050505;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            color: #fff;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #111 0%, transparent 100%),
                              url('https://grainy-gradients.vercel.app/noise.svg');
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* HUD Frame - Responsive for Mobile */
        .hud-frame {
            position: fixed;
            inset: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            pointer-events: none;
            z-index: 50;
        }

        .hud-corner {
            position: absolute;
            width: 15px;
            height: 15px;
            border: 2px solid var(--cyan);
        }

        /* Glass Cards - High Visibility */
        .glass-panel {
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
        }

        /* Responsive Title scaling */
        .elite-title {
            font-size: clamp(2.5rem, 12vw, 6.5rem);
            line-height: 0.9;
        }

        .scan-bar {
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--cyan);
            top: 0; left: 0;
            opacity: 0.4;
            animation: scan-move 3s linear infinite;
        }

        @keyframes scan-move {
            0% { top: 0; }
            100% { top: 100%; }
        }

        input { font-size: 16px !important; }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-4 md:p-10">

    <div class="hud-frame">
        <div class="hud-corner top-0 left-0 border-r-0 border-b-0"></div>
        <div class="hud-corner top-0 right-0 border-l-0 border-b-0"></div>
        <div class="hud-corner bottom-0 left-0 border-r-0 border-t-0"></div>
        <div class="hud-corner bottom-0 right-0 border-l-0 border-t-0"></div>
    </div>

    <header class="text-center mb-10 z-10 mt-6">
        <div class="inline-block px-3 py-1 border border-cyan-500/30 text-cyan-400 text-[10px] tracking-[0.4em] uppercase mb-4 font-mono">
            Secure Access Granted
        </div>
        <h1 class="elite-title font-black tracking-tighter uppercase italic">
            Registry<span class="text-cyan-500">.</span>
        </h1>
    </header>

    <main class="w-full max-w-2xl z-10">
        
        <div class="glass-panel rounded-lg flex flex-col sm:flex-row mb-8">
            <div class="flex items-center flex-grow p-4 border-b sm:border-b-0 sm:border-r border-white/10">
                <div class="pl-2 text-cyan-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <input
                    list="teamList"
                    id="teamName"
                    placeholder="INITIALIZE SCAN..."
                    class="bg-transparent flex-grow p-2 outline-none text-white font-mono tracking-widest uppercase text-sm placeholder:text-zinc-700"
                    onkeypress="if(event.key === 'Enter') searchTeam()"
                >
                <datalist id="teamList"></datalist>
            </div>
            
            <div class="flex h-14 sm:h-auto">
                <button
                    onclick="searchTeam()"
                    class="flex-grow sm:flex-none bg-cyan-500 hover:bg-white text-black px-10 transition-all font-black text-xs uppercase tracking-[0.2em]"
                >
                    Verify
                </button>
                <button
                    onclick="clearResult()"
                    class="w-16 bg-zinc-900 hover:bg-red-600 text-zinc-500 hover:text-white transition-all flex items-center justify-center border-l border-white/10"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
        </div>

        <div id="result" class="min-h-[200px]">
            <div class="text-center opacity-30 mt-12">
                <p class="font-mono text-[9px] tracking-[1em] uppercase">Awaiting Protocol...</p>
            </div>
        </div>

    </main>

    <script>
        let teams = [];

        async function loadTeams() {
            try {
                const res = await fetch("teams.csv");
                const text = await res.text();
                const rows = text.split("\n").slice(1);

                teams = rows.filter(r => r.trim()).map(row => {
                    const cols = row.split(",");
                    return {
                        name: cols[0],
                        leader: cols[1],
                        members: [
                            { n: cols[2], s: cols[4] },
                            { n: cols[5], s: cols[7] },
                            { n: cols[8], s: cols[10] },
                            { n: cols[11], s: cols[13] }
                        ]
                    };
                });

                const list = document.getElementById("teamList");
                teams.forEach(t => {
                    const op = document.createElement("option");
                    op.value = t.name;
                    list.appendChild(op);
                });
            } catch (e) { console.error("Database load error"); }
        }

        function searchTeam() {
            const val = document.getElementById("teamName").value.trim().toLowerCase();
            const out = document.getElementById("result");
            if (!val) return;

            out.innerHTML = `
                <div class="glass-panel p-16 rounded-lg text-center animate-pulse border-cyan-500/20">
                    <div class="scan-bar"></div>
                    <p class="font-mono text-cyan-500 text-xs tracking-widest">ENCRYPTING_SEQUENCE...</p>
                </div>`;

            setTimeout(() => {
                const team = teams.find(t => t.name.toLowerCase() === val);

                if (!team) {
                    out.innerHTML = `
                        <div class="glass-panel p-10 rounded-lg border-red-500/30 text-center bg-red-950/10">
                            <p class="text-red-500 font-mono text-xs mb-2">ACCESS_DENIED</p>
                            <h2 class="text-2xl font-bold uppercase">Identity Unknown</h2>
                        </div>`;
                    return;
                }

                const allOk = team.members.every(m => m.s === "Verified");

                out.innerHTML = `
                    <div class="glass-panel p-6 md:p-10 rounded-lg border-t-2 ${allOk ? 'border-cyan-500 shadow-[0_0_20px_rgba(0,242,255,0.15)]' : 'border-pink-500 shadow-[0_0_20px_rgba(255,0,85,0.15)]'}">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-10 gap-4">
                            <div>
                                <p class="font-mono text-[10px] text-cyan-500 mb-1 uppercase">Authentication Subject</p>
                                <h2 class="text-4xl md:text-6xl font-black uppercase tracking-tighter break-all">${team.name}</h2>
                            </div>
                            <div class="text-left md:text-right border-t md:border-0 border-white/10 pt-4 md:pt-0 w-full md:w-auto">
                                <p class="font-mono text-[10px] text-zinc-500 uppercase">Status</p>
                                <p class="text-xl font-bold ${allOk ? 'text-cyan-400' : 'text-pink-500'} uppercase">
                                    ${allOk ? 'Validated' : 'Pending Action'}
                                </p>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                            ${team.members.map((m, i) => `
                                <div class="bg-white/5 p-4 border border-white/10 rounded group hover:bg-white/10 transition-all">
                                    <p class="font-mono text-[8px] text-zinc-500 mb-2">OPERATIVE_0${i+1}</p>
                                    <p class="text-white font-bold text-sm truncate mb-3">${m.n || '---'}</p>
                                    <div class="flex items-center gap-2">
                                        <div class="w-1.5 h-1.5 rounded-full ${m.s === 'Verified' ? 'bg-cyan-500' : 'bg-pink-500'}"></div>
                                        <span class="font-mono text-[9px] uppercase ${m.s === 'Verified' ? 'text-cyan-400 font-bold' : 'text-pink-500'}">${m.s}</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                        <div class="mt-8 flex justify-between items-center opacity-40">
                            <p class="font-mono text-[9px] font-bold">LEADER: ${team.leader}</p>
                            <p class="font-mono text-[9px]">REGISTRY_SECURE</p>
                        </div>
                    </div>
                `;
            }, 600);
        }

        function clearResult() {
            document.getElementById("teamName").value = "";
            document.getElementById("result").innerHTML = `
                <div class="text-center opacity-30 mt-12">
                    <p class="font-mono text-[9px] tracking-[1em] uppercase">Awaiting Protocol...</p>
                </div>`;
        }

        loadTeams();
    </script>
</body>
</html>
