<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL | Mobile Optimized</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --cyan: #00f2ff;
            --pink: #ff0055;
            --bg: #050505;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            color: #fff;
            background-image: 
                radial-gradient(circle at 50% 50%, #111 0%, transparent 100%),
                url('https://grainy-gradients.vercel.app/noise.svg');
            background-attachment: fixed;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* Mobile-Safe HUD */
        .hud-frame {
            position: fixed;
            inset: 10px; /* Smaller inset for mobile */
            border: 1px solid rgba(255, 255, 255, 0.05);
            pointer-events: none;
            z-index: 50;
        }

        .hud-corner {
            position: absolute;
            width: 15px;
            height: 15px;
            border: 2px solid var(--cyan);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        /* Status Glows */
        .verified-glow { box-shadow: 0 0 30px rgba(0, 242, 255, 0.1); border-color: var(--cyan); }
        .pending-glow { box-shadow: 0 0 30px rgba(255, 0, 85, 0.1); border-color: var(--pink); }

        .scan-bar {
            position: absolute;
            width: 100%;
            height: 1px;
            background: var(--cyan);
            top: 0; left: 0;
            opacity: 0.3;
            animation: scan-move 3s linear infinite;
        }

        @keyframes scan-move {
            0% { top: 0; }
            100% { top: 100%; }
        }

        /* Hide scrollbar but keep functionality */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center p-4 md:p-10">

    <div class="hud-frame">
        <div class="hud-corner top-0 left-0 border-r-0 border-b-0"></div>
        <div class="hud-corner top-0 right-0 border-l-0 border-b-0"></div>
        <div class="hud-corner bottom-0 left-0 border-r-0 border-t-0"></div>
        <div class="hud-corner bottom-0 right-0 border-l-0 border-t-0"></div>
    </div>

    <header class="text-center mt-8 mb-10 z-10 w-full">
        <div class="inline-block px-3 py-1 border border-cyan-500/30 text-cyan-400 text-[9px] tracking-[0.3em] uppercase mb-4 font-mono">
            System: Mobile_Protocol_Active
        </div>
        <h1 class="text-5xl md:text-8xl font-black tracking-tighter uppercase italic">
            Registry<span class="text-cyan-500">.</span>
        </h1>
    </header>

    <main class="w-full max-w-3xl z-10">
        
        <div class="glass-panel rounded-xl flex flex-col md:flex-row mb-6 overflow-hidden">
            <div class="flex items-center flex-grow p-2 border-b md:border-b-0 md:border-r border-white/10">
                <div class="pl-4 text-cyan-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <input
                    list="teamList"
                    id="teamName"
                    placeholder="ENTER TEAM ID..."
                    class="bg-transparent w-full p-4 outline-none text-white font-mono tracking-widest uppercase text-sm"
                    onkeypress="if(event.key === 'Enter') searchTeam()"
                >
                <datalist id="teamList"></datalist>
            </div>
            
            <button
                onclick="searchTeam()"
                class="bg-cyan-500 hover:bg-white text-black py-4 md:px-10 transition-all font-black text-xs uppercase tracking-[0.2em]"
            >
                Verify_Identity
            </button>
        </div>

        <div id="result" class="transition-all duration-500">
            <div class="text-center opacity-20 mt-12">
                <p class="font-mono text-[9px] tracking-[0.8em] uppercase">Awaiting Scan Command</p>
            </div>
        </div>

    </main>

    <script>
        // Use the same 'teams' logic as before
        let teams = [];

        async function loadTeams() {
            try {
                const res = await fetch("teams.csv");
                const text = await res.text();
                const rows = text.split("\n").slice(1);
                teams = rows.filter(r => r.trim()).map(row => {
                    const cols = row.split(",");
                    return {
                        name: cols[0],
                        leader: cols[1],
                        members: [
                            { n: cols[2], s: cols[4] },
                            { n: cols[5], s: cols[7] },
                            { n: cols[8], s: cols[10] },
                            { n: cols[11], s: cols[13] }
                        ]
                    };
                });
                const list = document.getElementById("teamList");
                teams.forEach(t => {
                    const op = document.createElement("option");
                    op.value = t.name;
                    list.appendChild(op);
                });
            } catch (e) { console.error(e); }
        }

        function searchTeam() {
            const val = document.getElementById("teamName").value.trim().toLowerCase();
            const out = document.getElementById("result");
            if (!val) return;

            out.innerHTML = `
                <div class="glass-panel p-12 rounded-xl text-center border-cyan-500/20">
                    <div class="scan-bar"></div>
                    <p class="font-mono text-cyan-500 text-[10px] animate-pulse">PROCESSING_DATA_PACKETS...</p>
                </div>`;

            setTimeout(() => {
                const team = teams.find(t => t.name.toLowerCase() === val);

                if (!team) {
                    out.innerHTML = `<div class="glass-panel p-8 rounded-xl border-red-500/30 text-center">
                        <h2 class="text-xl font-bold uppercase text-red-500 font-mono">ID_NOT_FOUND</h2>
                    </div>`;
                    return;
                }

                const allOk = team.members.every(m => m.s === "Verified");

                out.innerHTML = `
                    <div class="glass-panel p-6 md:p-8 rounded-xl ${allOk ? 'verified-glow' : 'pending-glow'}">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 gap-4">
                            <div>
                                <p class="font-mono text-[9px] text-cyan-500 mb-1">DATASET_B_04</p>
                                <h2 class="text-3xl md:text-5xl font-black uppercase tracking-tighter break-all">${team.name}</h2>
                            </div>
                            <div class="w-full md:w-auto text-left md:text-right border-t md:border-0 border-white/10 pt-4 md:pt-0">
                                <p class="font-mono text-[9px] text-zinc-500">AUTH_STATUS</p>
                                <p class="text-lg font-bold ${allOk ? 'text-cyan-400' : 'text-pink-500'} uppercase">
                                    ${allOk ? 'VALIDATED' : 'DISCREPANCY'}
                                </p>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
                            ${team.members.map((m, i) => `
                                <div class="bg-white/5 p-4 border border-white/5 rounded-lg">
                                    <p class="font-mono text-[8px] text-zinc-600 mb-1">NODE_0${i+1}</p>
                                    <p class="text-white font-bold text-xs truncate">${m.n || '---'}</p>
                                    <div class="flex items-center gap-2 mt-2">
                                        <div class="w-1.5 h-1.5 rounded-full ${m.s === 'Verified' ? 'bg-cyan-400' : 'bg-pink-500'}"></div>
                                        <span class="font-mono text-[9px] ${m.s === 'Verified' ? 'text-cyan-400' : 'text-pink-500'}">${m.s}</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                        <div class="mt-6 pt-4 border-t border-white/5 flex justify-between items-center opacity-40">
                            <p class="font-mono text-[8px]">LEADER: ${team.leader}</p>
                            <p class="font-mono text-[8px] text-right">03.13.2026</p>
                        </div>
                    </div>
                `;
            }, 600);
        }

        loadTeams();
    </script>
</body>
</html>
