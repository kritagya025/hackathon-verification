<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Portal | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --accent: #ffffff;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: #a1a1aa;
            overflow-x: hidden;
        }
        h1, h2, .font-mono { font-family: 'Space Grotesk', sans-serif; }

        /* Dynamic Mesh Background */
        .mesh-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 0% 0%, #111 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, #0a0a0a 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, #050505 0%, transparent 100%);
            z-index: -2;
        }

        .grid-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            mask-image: radial-gradient(ellipse at center, black, transparent 80%);
        }

        /* Premium Glass */
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        /* Button Shimmer */
        .btn-shimmer {
            position: relative;
            overflow: hidden;
        }
        .btn-shimmer::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
        }
        .btn-shimmer:hover::after {
            left: 120%;
        }

        /* Scanline Animation */
        .scanline {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            position: absolute;
            top: 0;
            animation: scan 3s linear infinite;
        }
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .reveal-3d {
            animation: reveal3d 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            perspective: 1000px;
        }
        @keyframes reveal3d {
            from { opacity: 0; transform: rotateX(-10deg) translateY(40px); }
            to { opacity: 1; transform: rotateX(0) translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-20 px-6">

    <div class="mesh-bg"></div>
    <div class="grid-overlay"></div>

    <header class="text-center mb-16 relative">
        <div class="flex justify-center mb-6">
            <div class="relative">
                <div class="absolute inset-0 blur-xl bg-white/10 rounded-full"></div>
                <svg class="relative text-white" width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
            </div>
        </div>
        <h1 class="text-6xl font-bold tracking-tighter text-white mb-4 uppercase">Registry</h1>
        <div class="flex items-center justify-center gap-4 text-zinc-500">
            <span class="h-px w-8 bg-zinc-800"></span>
            <p class="text-[10px] tracking-[0.5em] font-bold uppercase">Authorized Access Only</p>
            <span class="h-px w-8 bg-zinc-800"></span>
        </div>
    </header>

    <main class="w-full max-w-2xl">
        <div class="glass p-2 rounded-2xl flex flex-col md:flex-row gap-2 transition-all duration-500 hover:border-zinc-600 mb-12">
            <input 
                list="teamList" 
                id="teamName" 
                placeholder="Search Team Identity..."
                class="bg-transparent flex-grow p-4 outline-none text-white placeholder:text-zinc-700 font-medium tracking-wide"
            >
            <datalist id="teamList"></datalist>
            
            <div class="flex gap-2 p-1">
                <button 
                    onclick="searchTeam()" 
                    class="btn-shimmer bg-white text-black px-10 py-3 rounded-xl font-black text-xs uppercase tracking-widest hover:scale-[1.02] transition-all active:scale-95"
                >
                    Verify
                </button>
                <button 
                    onclick="clearResult()" 
                    class="bg-zinc-900/50 text-zinc-500 px-5 py-3 rounded-xl hover:text-white transition-all border border-zinc-800"
                >
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"></path></svg>
                </button>
            </div>
        </div>

        <div id="result" class="min-h-[400px]">
            <div class="flex flex-col items-center justify-center pt-20">
                <div class="w-32 h-32 border border-zinc-900 rounded-full flex items-center justify-center mb-6 opacity-20">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="12" r="10"></circle><path d="M12 8v4l3 3"></path></svg>
                </div>
                <p class="text-[10px] tracking-[0.3em] uppercase font-bold text-zinc-800">System Ready / Awaiting Query</p>
            </div>
        </div>
    </main>

    <script>
        let teams = [];

        async function loadTeams() {
            try {
                const res = await fetch("teams.csv");
                const text = await res.text();
                const rows = text.split("\n").slice(1);
                teams = rows.filter(r => r.trim()).map(row => {
                    const cols = row.split(",");
                    return {
                        TeamName: cols[0], Leader: cols[1], Member2: cols[2], 
                        Member3: cols[3], Member4: cols[4], Phone: cols[5], 
                        UTR: cols[6], Payment: cols[7]
                    }
                });
                const teamList = document.getElementById("teamList");
                teams.forEach(team => {
                    const option = document.createElement("option");
                    option.value = team.TeamName;
                    teamList.appendChild(option);
                });
            } catch (e) { console.error("CSV Load Error"); }
        }
        loadTeams();

        function searchTeam() {
            const input = document.getElementById("teamName").value.trim().toLowerCase();
            const resultDiv = document.getElementById("result");
            if (!input) return;

            const team = teams.find(t => t.TeamName.toLowerCase() === input);

            if (!team) {
                resultDiv.innerHTML = `
                    <div class="reveal-3d glass border-red-900/30 p-12 rounded-[2.5rem] text-center">
                        <div class="inline-flex p-4 rounded-full bg-red-500/5 text-red-500 mb-4 italic font-bold">404</div>
                        <h3 class="text-white text-xl font-bold mb-2 uppercase tracking-tighter">Identity Not Found</h3>
                        <p class="text-zinc-600 text-sm">The requested team is not registered in our current protocol.</p>
                    </div>`;
                return;
            }

            const isVerified = team.Payment === "Verified";
            const color = isVerified ? "text-emerald-400" : "text-rose-500";
            const bg = isVerified ? "bg-emerald-500/10" : "bg-rose-500/10";
            const glow = isVerified ? "shadow-[0_0_20px_rgba(16,185,129,0.1)]" : "shadow-[0_0_20px_rgba(244,63,94,0.1)]";

            resultDiv.innerHTML = `
                <div class="reveal-3d glass p-1 rounded-[2.5rem] relative overflow-hidden ${glow}">
                    <div class="scanline"></div>
                    <div class="p-10 rounded-[2.4rem] bg-gradient-to-b from-white/[0.03] to-transparent">
                        
                        <div class="flex flex-col md:flex-row justify-between items-start gap-6 mb-12">
                            <div>
                                <p class="text-[9px] font-black uppercase tracking-[0.4em] text-zinc-600 mb-2">Team Identity</p>
                                <h2 class="text-5xl font-bold text-white tracking-tighter uppercase italic">${team.TeamName}</h2>
                            </div>
                            <div class="flex items-center gap-3 px-5 py-2 rounded-full border border-white/10 ${bg} ${color}">
                                <span class="relative flex h-2 w-2">
                                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full ${isVerified ? 'bg-emerald-400' : 'bg-rose-400'} opacity-75"></span>
                                  <span class="relative inline-flex rounded-full h-2 w-2 ${isVerified ? 'bg-emerald-500' : 'bg-rose-500'}"></span>
                                </span>
                                <span class="text-[10px] font-black uppercase tracking-[0.2em]">${team.Payment}</span>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-10">
                            <div class="group">
                                <label class="text-[9px] font-bold uppercase text-zinc-700 tracking-[0.3em] block mb-3 group-hover:text-zinc-500 transition-colors">Team Leader</label>
                                <p class="text-2xl text-zinc-100 font-medium tracking-tight">${team.Leader}</p>
                            </div>

                            <div class="group">
                                <label class="text-[9px] font-bold uppercase text-zinc-700 tracking-[0.3em] block mb-3 group-hover:text-zinc-500 transition-colors">Contact Line</label>
                                <p class="text-2xl text-zinc-100 font-mono tracking-tighter">${team.Phone}</p>
                            </div>

                            <div class="md:col-span-2 group">
                                <label class="text-[9px] font-bold uppercase text-zinc-700 tracking-[0.3em] block mb-3 group-hover:text-zinc-500 transition-colors">Team Members</label>
                                <p class="text-zinc-400 leading-relaxed text-lg font-light italic">${team.Member2}, ${team.Member3}, ${team.Member4}</p>
                            </div>

                            <div class="md:col-span-2 pt-8 mt-4 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-4">
                                <div>
                                    <label class="text-[9px] font-bold uppercase text-zinc-800 tracking-[0.3em] block mb-1">Transaction hash</label>
                                    <p class="text-zinc-600 font-mono text-xs uppercase tracking-widest">${team.UTR}</p>
                                </div>
                                <div class="opacity-10 grayscale">
                                    <svg width="80" height="20" viewBox="0 0 120 30"><rect x="0" y="5" width="2" height="20" fill="white"/><rect x="5" y="5" width="5" height="20" fill="white"/><rect x="15" y="5" width="2" height="20" fill="white"/><rect x="20" y="5" width="8" height="20" fill="white"/><rect x="35" y="5" width="2" height="20" fill="white"/></svg>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function clearResult() {
            document.getElementById("teamName").value = "";
            document.getElementById("result").innerHTML = `
                <div class="flex flex-col items-center justify-center pt-20">
                    <div class="w-32 h-32 border border-zinc-900 rounded-full flex items-center justify-center mb-6 opacity-20">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="12" r="10"></circle><path d="M12 8v4l3 3"></path></svg>
                    </div>
                    <p class="text-[10px] tracking-[0.3em] uppercase font-bold text-zinc-800">System Ready / Awaiting Query</p>
                </div>
            `;
        }
    </script>
</body>
</html>
