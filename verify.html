<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #050505;
            overflow-x: hidden;
        }

        /* Animated Background Elements */
        .aura {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            filter: blur(80px);
            z-index: -1;
            animation: float 15s infinite alternate;
        }

        @keyframes float {
            0% { transform: translate(-10%, -10%); }
            100% { transform: translate(100%, 50%); }
        }

        .glass-panel {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-glow:focus {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Animation for Card entry */
        .reveal {
            animation: revealCard 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes revealCard {
            from { opacity: 0; transform: translateY(30px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>
<body class="text-zinc-300 min-h-screen flex flex-col items-center py-16 px-6">

    <div class="aura top-0 left-0"></div>
    <div class="aura bottom-0 right-0" style="animation-delay: -5s; background: rgba(255,255,255,0.02);"></div>

    <header class="text-center mb-12 relative">
        <div class="mb-4 inline-block opacity-20">
            <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        </div>
        <h1 class="text-5xl font-extrabold tracking-tighter text-white mb-2">Check Registry</h1>
        <p class="text-zinc-500 text-xs tracking-[0.4em] uppercase">Secure Verification Interface</p>
    </header>

    <main class="w-full max-w-xl">
        <div class="glass-panel p-2 rounded-2xl flex flex-col md:flex-row gap-2 transition-all duration-300 hover:border-zinc-700">
            <input 
                list="teamList" 
                id="teamName" 
                placeholder="Enter team name..."
                class="bg-transparent flex-grow p-4 outline-none text-white placeholder:text-zinc-600 font-medium"
            >
            <datalist id="teamList"></datalist>
            
            <div class="flex gap-2 p-1">
                <button 
                    onclick="searchTeam()" 
                    class="bg-white text-black px-8 py-3 rounded-xl font-bold text-sm uppercase tracking-wider hover:bg-zinc-200 transition-all active:scale-95"
                >
                    Verify
                </button>
                <button 
                    onclick="clearResult()" 
                    class="bg-zinc-800/50 text-zinc-400 px-5 py-3 rounded-xl font-bold text-sm hover:bg-zinc-800 transition-all border border-zinc-700"
                >
                    ✕
                </button>
            </div>
        </div>

        <div id="result" class="mt-10 min-h-[300px]">
            <div id="empty-state" class="flex flex-col items-center justify-center pt-10 opacity-20">
                <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <p class="mt-4 text-sm tracking-widest uppercase">Awaiting Input</p>
            </div>
        </div>
    </main>

    <script>
    let teams = [];

    async function loadTeams(){
    const url = "teams.csv";

    const res = await fetch(url);
    const text = await res.text();

    const rows = text.split("\n").slice(1);

    teams = rows.map(row => {
        const cols = row.split(",");
        return {
            TeamName: cols[0],
            Leader: cols[1],
            Member2: cols[2],
            Member3: cols[3],
            Member4: cols[4],
            Phone: cols[5],
            UTR: cols[6],
            Payment: cols[7],
            Room: cols[8]
        }
    });

    const teamList = document.getElementById("teamList");

    teams.forEach(team => {
        const option = document.createElement("option");
        option.value = team.TeamName;
        teamList.appendChild(option);
    });
}

    loadTeams();

        const teamList = document.getElementById("teamList");
        if (typeof teams !== 'undefined') {
            teams.forEach(team => {
                const option = document.createElement("option");
                option.value = team.TeamName;
                teamList.appendChild(option);
            });
        }

        function searchTeam() {
            const input = document.getElementById("teamName").value.trim().toLowerCase();
            const resultDiv = document.getElementById("result");
            
            if (!input) return;

            const team = teams.find(t => t.TeamName.toLowerCase() === input);

            if (!team) {
                resultDiv.innerHTML = `
                    <div class="reveal flex flex-col items-center text-red-500 bg-red-500/5 border border-red-500/20 p-8 rounded-3xl">
                        <svg class="mb-2" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                        <span class="font-bold uppercase tracking-widest text-xs">Access Denied: Team not found</span>
                    </div>`;
                return;
            }

            const isVerified = team.Payment === "Verified";
            const color = isVerified ? "text-green-500" : "text-red-500";
            const border = isVerified ? "border-green-500/30" : "border-red-500/30";

            resultDiv.innerHTML = `
                <div class="reveal glass-panel p-10 rounded-[2.5rem] relative overflow-hidden">
                    <div class="absolute -top-10 -right-10 opacity-5">
                        <svg width="200" height="200" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                    </div>

                    <div class="flex flex-col md:flex-row justify-between items-start gap-4 mb-10">
                        <div>
                            <h2 class="text-4xl font-extrabold text-white tracking-tighter italic uppercase">${team.TeamName}</h2>
                        </div>
                        <div class="flex items-center gap-2 px-4 py-2 rounded-full border ${border} ${color} bg-white/5">
                            <div class="w-2 h-2 rounded-full animate-pulse ${isVerified ? 'bg-green-500' : 'bg-red-500'}"></div>
                            <span class="text-[10px] font-black uppercase tracking-widest">${team.Payment}</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                        <div class="transition-all hover:translate-x-1">
                            <label class="text-[10px] font-bold uppercase text-zinc-600 tracking-[0.2em] block mb-2">Leader</label>
                            <p class="text-xl text-zinc-100 font-semibold flex items-center gap-2">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                                ${team.Leader}
                            </p>
                        </div>

                        <div class="transition-all hover:translate-x-1">
                            <label class="text-[10px] font-bold uppercase text-zinc-600 tracking-[0.2em] block mb-2">Phone</label>
                            <p class="text-xl text-zinc-100 font-semibold font-mono">${team.Phone}</p>
                        </div>

                        <div class="md:col-span-2 transition-all hover:translate-x-1">
                            <label class="text-[10px] font-bold uppercase text-zinc-600 tracking-[0.2em] block mb-2">Team Members</label>
                            <p class="text-zinc-400 leading-relaxed text-lg">${team.Member2}, ${team.Member3}, ${team.Member4}</p>
                        </div>

                        <div class="md:col-span-2 pt-8 mt-4 border-t border-zinc-800/50 flex justify-between items-center">
                            <div>
                                <label class="text-[10px] font-bold uppercase text-zinc-600 tracking-[0.2em] block mb-1">Transaction Ref</label>
                                <p class="text-zinc-500 font-mono text-sm uppercase">${team.UTR}</p>
                            </div>
                            <svg class="opacity-10" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        </div>
                    </div>
                </div>
            `;
        }

        function clearResult() {
            document.getElementById("teamName").value = "";
            document.getElementById("result").innerHTML = `
                <div id="empty-state" class="flex flex-col items-center justify-center pt-10 opacity-20">
                    <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <p class="mt-4 text-sm tracking-widest uppercase">Awaiting Input</p>
                </div>
            `;
        }
    </script>
</body>
</html>
